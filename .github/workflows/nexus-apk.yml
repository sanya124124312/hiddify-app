name: Nexus VPN APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: echo "y" | sdkmanager "ndk;28.2.13676358" --channel=0

      - name: Download hiddify-core via Makefile
        run: |
          set -e
          make android-libs
          echo "=== Checking downloaded libs ==="
          find android/app/libs -type f | head -30
          ls -lh android/app/libs/ || echo "libs dir empty!"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK arm64
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK x86_64
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
        continue-on-error: true
