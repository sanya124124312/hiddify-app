name: Nexus VPN APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: echo "y" | sdkmanager "ndk;28.2.13676358" --channel=0

      - name: Install dependencies
        run: flutter pub get

      - name: Download hiddify-core
        run: |
          if [ -f Makefile ]; then
            make android-amd64-prepare 2>/dev/null || true
          fi
          # Download prebuilt core if needed
          CORE_DIR="android/app/src/main/jniLibs"
          if [ ! -d "$CORE_DIR" ] || [ -z "$(ls -A $CORE_DIR 2>/dev/null)" ]; then
            echo "Downloading prebuilt hiddify-core..."
            RELEASE_URL="https://github.com/hiddify/hiddify-next/releases/latest/download"
            mkdir -p "$CORE_DIR/arm64-v8a" "$CORE_DIR/x86_64"
            curl -fsSL "$RELEASE_URL/libcore-android-arm64.so" -o "$CORE_DIR/arm64-v8a/libcore.so" || true
            curl -fsSL "$RELEASE_URL/libcore-android-amd64.so" -o "$CORE_DIR/x86_64/libcore.so" || true
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (universal)
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-universal
          path: build/app/outputs/flutter-apk/app-release.apk
        continue-on-error: true
